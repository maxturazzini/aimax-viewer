<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI,MAX Slide Presenter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --blue: #004BFF;
    --sky: #35C2FF;
    --green: #00D35D;
    --yellow: #F9C927;
    --dark: #0a0a1a;
    --gray: #1a1a2e;
    --light: #F2F2F2;
    --next-height: 35%;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: #fff;
    height: 100vh;
    overflow: hidden;
    user-select: none;
}

/* === LAYOUT === */
.presenter {
    display: grid;
    grid-template-columns: 1fr 8px 1fr;
    grid-template-rows: 1fr auto auto auto;
    height: 100vh;
    gap: 12px 0;
    padding: 12px;
}

/* === CURRENT SLIDE PREVIEW === */
.current-slide {
    grid-column: 1;
    grid-row: 1;
    margin-right: 6px;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
}

.current-slide .label {
    background: var(--blue);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 14px;
    text-transform: uppercase;
}

.current-slide .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
}

.current-slide iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    height: 720px;
    border: none;
    pointer-events: none;
    transform-origin: 0 0;
}

/* === COLUMN RESIZE HANDLE === */
.col-resize-handle {
    grid-column: 2;
    grid-row: 1;
    width: 8px;
    cursor: col-resize;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

.col-resize-handle::after {
    content: '';
    width: 3px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    transition: background 0.2s;
}

.col-resize-handle:hover::after,
.col-resize-handle.dragging::after {
    background: var(--sky);
}

/* === NOTES PANEL === */
.notes-panel {
    grid-column: 3;
    grid-row: 1;
    margin-left: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.next-slide {
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    height: 45%;
}

.next-slide .label {
    background: var(--gray);
    color: #999;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 14px;
    text-transform: uppercase;
    flex-shrink: 0;
}

.next-slide .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
}

.next-slide iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    height: 720px;
    border: none;
    pointer-events: none;
    transform-origin: 0 0;
}

/* === RESIZE HANDLE === */
.resize-handle {
    height: 8px;
    cursor: row-resize;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.resize-handle::after {
    content: '';
    width: 40px;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    transition: background 0.2s;
}

.resize-handle:hover::after,
.resize-handle.dragging::after {
    background: var(--sky);
}

.notes-content {
    flex: 1;
    background: var(--gray);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 60px;
}

.notes-content .label {
    background: var(--yellow);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 14px;
    text-transform: uppercase;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.notes-font-controls {
    display: inline-flex;
    gap: 4px;
    align-items: center;
}

.notes-font-controls button {
    background: rgba(0,0,0,0.15);
    border: none;
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1;
    text-transform: none;
    letter-spacing: 0;
}

.notes-font-controls button:hover {
    background: rgba(0,0,0,0.3);
}

.agentic-save-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 20px;
    padding: 0 !important;
}

.agentic-save-btn svg {
    width: 14px;
    height: 14px;
    display: block;
}

.agentic-save-btn[disabled] {
    opacity: 0.4;
    cursor: wait;
    pointer-events: none;
}

.agentic-save-btn.flash-success { background: var(--green) !important; color: #fff !important; }
.agentic-save-btn.flash-error { background: #c33 !important; color: #fff !important; }

/* === AGENTIC SAVE BANNERS === */
#agenticBanners {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 380px;
    pointer-events: none;
}

.agentic-banner {
    background: rgba(20, 20, 30, 0.96);
    color: #eee;
    border-radius: 6px;
    padding: 10px 12px 10px 14px;
    border-left: 4px solid var(--yellow);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    font-size: 13px;
    line-height: 1.4;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.agentic-banner.success { border-left-color: var(--green); }
.agentic-banner.error { border-left-color: #c33; }

.agentic-banner .ab-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.agentic-banner .ab-title {
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    color: #fff;
    text-transform: uppercase;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.agentic-banner .ab-close {
    background: transparent;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 4px;
    font-family: inherit;
}

.agentic-banner .ab-close:hover { color: #fff; }

.agentic-banner .ab-msg {
    color: #ccc;
    font-size: 12px;
    word-break: break-word;
}

.agentic-banner .ab-actions {
    display: flex;
    gap: 6px;
    margin-top: 2px;
}

.agentic-banner .ab-actions button {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
}

.agentic-banner .ab-actions button:hover { background: var(--blue); }

.agentic-banner .ab-spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: ab-spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
}

@keyframes ab-spin { to { transform: rotate(360deg); } }

.notes-text {
    flex: 1;
    padding: 20px 24px;
    font-size: 20px;
    line-height: 1.7;
    color: #eee;
    overflow-y: auto;
    outline: none;
    cursor: text;
}

.notes-text:focus {
    box-shadow: inset 0 0 0 2px var(--yellow);
}

/* === CAROUSEL RESIZE HANDLE === */
.carousel-resize-handle {
    grid-column: 1 / -1;
    grid-row: 2;
    height: 8px;
    cursor: row-resize;
    display: flex;
    align-items: center;
    justify-content: center;
}

.carousel-resize-handle::after {
    content: '';
    width: 40px;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    transition: background 0.2s;
}

.carousel-resize-handle:hover::after,
.carousel-resize-handle.dragging::after {
    background: var(--sky);
}

/* === CAROUSEL === */
.carousel {
    grid-column: 1 / -1;
    grid-row: 3;
    background: var(--gray);
    border-radius: 8px;
    padding: 6px 10px;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    gap: 6px;
    align-items: center;
}

.carousel-item {
    flex: 0 0 auto;
    width: 106px;
    height: 60px;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    position: relative;
}

.carousel-item:hover {
    border-color: rgba(255,255,255,0.3);
}

.carousel-item.active {
    border-color: var(--blue);
}

.carousel-item iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    height: 720px;
    border: none;
    pointer-events: none;
    transform-origin: 0 0;
}

.carousel-item .carousel-num {
    position: absolute;
    bottom: 2px;
    right: 3px;
    font-size: 8px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    z-index: 1;
    opacity: 0;
    transition: opacity 0.2s;
}

.carousel-item:hover .carousel-num,
.carousel-item.active .carousel-num {
    opacity: 1;
}

/* === BOTTOM BAR === */
.bottom-bar {
    grid-column: 1 / -1;
    grid-row: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--gray);
    border-radius: 8px;
    padding: 10px 20px;
    gap: 20px;
}

.slide-counter {
    font-size: 18px;
    font-weight: 700;
    color: var(--sky);
    min-width: 100px;
}

.slide-title {
    flex: 1;
    font-size: 14px;
    color: #aaa;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.controls {
    display: flex;
    gap: 8px;
    align-items: center;
}

.controls button {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.controls button:hover {
    background: var(--blue);
}

.controls button.active {
    background: var(--blue);
}

.timer {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--green);
    min-width: 80px;
    text-align: right;
}

/* === STARTUP === */
.startup {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 30px;
}

.startup h1 {
    font-size: 32px;
    font-weight: 800;
    color: var(--blue);
}

.startup p {
    color: #999;
    font-size: 16px;
    max-width: 500px;
    text-align: center;
    line-height: 1.6;
}

.startup .deck-input {
    display: flex;
    gap: 12px;
    align-items: center;
}

.startup input {
    background: var(--gray);
    border: 2px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    width: 400px;
    outline: none;
}

.startup input:focus {
    border-color: var(--blue);
}

.startup .go-btn {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
}

.startup .go-btn:hover {
    background: #0040dd;
}

/* === OPTIONS BAR === */
.options-bar {
    display: flex;
    gap: 6px;
    padding: 6px 10px;
    background: var(--gray);
    border-radius: 0 0 8px 8px;
    flex-shrink: 0;
}

.options-bar button {
    background: rgba(255,255,255,0.08);
    color: #888;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.options-bar button:hover {
    background: rgba(255,255,255,0.15);
    color: #ccc;
}

.options-bar button.active {
    background: var(--blue);
    color: #fff;
}

/* === NOTES LIGHT THEME === */
.notes-content.light {
    background: #f0f0f0;
}

.notes-content.light .notes-text {
    color: #222;
}

/* === CLOCK === */
.clock {
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--light);
    min-width: 50px;
    text-align: right;
}

.hidden { display: none !important; }

/* scrollbar */
.notes-text::-webkit-scrollbar { width: 6px; }
.notes-text::-webkit-scrollbar-track { background: transparent; }
.notes-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

.carousel::-webkit-scrollbar { height: 3px; }
.carousel::-webkit-scrollbar-track { background: transparent; }
.carousel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    </style>
</head>
<body>

<!-- STARTUP SCREEN -->
<div class="startup" id="startup">
    <h1>AI,MAX Slide Presenter</h1>
    <p>Enter the HTML deck URL. Opens an audience window (projector) &mdash; here you see notes + next slide.</p>
    <div class="deck-input">
        <input type="text" id="deckUrl" placeholder="http://127.0.0.1:3134/projects/.../w2.html" autofocus>
        <button class="go-btn" onclick="startPresenter()">Start</button>
    </div>
    <p style="font-size: 13px; color: #666;">Keys: ← → navigate | F fullscreen audience | T timer | +/- notes font | Home/End first/last</p>
</div>

<!-- PRESENTER VIEW -->
<div class="presenter hidden" id="presenter">
    <div class="current-slide" id="currentSlidePanel">
        <div class="label">Current Slide</div>
        <div class="iframe-wrap">
            <iframe id="currentFrame"></iframe>
        </div>
        <div class="options-bar">
            <button id="toggleDotsBtn" onclick="toggleDots()">● Dots</button>
            <button id="toggleCarouselBtn" onclick="toggleCarousel()">▤ Carousel</button>
            <button id="toggleNotesThemeBtn" onclick="toggleNotesTheme()">◑ Light Notes</button>
            <button id="toggleSwapBtn" onclick="toggleSwapLayout()">⇅ Swap Layout</button>
        </div>
    </div>

    <div class="col-resize-handle" id="colResizeHandle"></div>

    <div class="notes-panel">
        <div class="next-slide" id="nextSlidePanel">
            <div class="label">Next</div>
            <div class="iframe-wrap">
                <iframe id="nextFrame"></iframe>
            </div>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="notes-content">
            <div class="label">Speaker Notes
                <span class="notes-font-controls">
                    <button id="agenticSaveBtn" class="agentic-save-btn" onclick="agenticSaveNotes()" title="Agentic Save Notes" aria-label="Agentic Save Notes">
                        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M2 2v12h12V4.5L11.5 2H2zm2 1h6v3h1V3h1.5L13 4.5V13H4v-3h6V8H4V3z"/><path d="M11.6 9.2l.6 1.2 1.2.6-1.2.6-.6 1.2-.6-1.2-1.2-.6 1.2-.6.6-1.2z"/></svg>
                    </button>
                    <button onclick="changeNotesFontSize(-2)" title="Decrease font">A&minus;</button>
                    <button onclick="changeNotesFontSize(2)" title="Increase font">A+</button>
                </span>
            </div>
            <div class="notes-text" id="notesText" contenteditable="true">&mdash;</div>
        </div>
    </div>

    <div class="carousel-resize-handle" id="carouselResizeHandle" title="Drag to resize carousel"></div>

    <div class="carousel" id="carousel"></div>

    <div class="bottom-bar">
        <div class="slide-counter" id="slideCounter">1 / ?</div>
        <div class="slide-title" id="slideTitle"></div>
        <div class="controls">
            <button onclick="prevSlide()">← Prev</button>
            <button onclick="nextSlide()">Next →</button>
            <button id="timerBtn" onclick="toggleTimer()">Timer</button>
            <button onclick="resetTimer()">↺</button>
        </div>
        <div class="timer" id="timer">00:00</div>
        <div class="clock" id="clock"></div>
    </div>
</div>

<!-- AGENTIC SAVE NOTES BANNERS -->
<div id="agenticBanners"></div>

<script>
let audienceWin = null;
let slides = [];
let currentIndex = 0;
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let deckBaseUrl = '';
let channel = null;
let audienceReady = false;

function startPresenter() {
    const url = document.getElementById('deckUrl').value.trim();
    if (!url) return;

    deckBaseUrl = url;
    document.getElementById('startup').classList.add('hidden');
    document.getElementById('presenter').classList.remove('hidden');

    // Apply default toggle states (dots hidden, layout swapped)
    applyDefaultToggles();

    // Open audience window
    audienceWin = window.open(url, 'audience', 'width=1280,height=720');
    audienceReady = false;

    // Wait for audience window to load, then sync
    if (audienceWin) {
        const checkAudienceLoad = setInterval(() => {
            try {
                if (audienceWin.document && audienceWin.document.readyState === 'complete') {
                    clearInterval(checkAudienceLoad);
                    audienceReady = true;
                    // Sync to current slide once audience is ready
                    syncAudienceToSlide(currentIndex);
                    // Return focus to presenter
                    window.focus();
                }
            } catch(e) { clearInterval(checkAudienceLoad); }
        }, 200);
    }

    // Set up BroadcastChannel
    channel = new BroadcastChannel('slide-presenter');

    // Load deck in hidden iframe to extract slides and notes
    const loader = document.createElement('iframe');
    loader.style.display = 'none';
    loader.src = url;
    document.body.appendChild(loader);

    loader.onload = () => {
        const doc = loader.contentDocument;
        const sections = doc.querySelectorAll('section');
        slides = [];
        sections.forEach((s, i) => {
            const h = s.querySelector('h1, h2');
            const notesEl = s.querySelector('.speaker-notes');
            slides.push({
                index: i,
                title: h ? h.textContent : `Slide ${i + 1}`,
                notes: notesEl ? notesEl.textContent : '',
                className: s.className
            });
        });
        document.body.removeChild(loader);
        buildCarousel();
        goToSlide(0);
        // Return focus to presenter window
        window.focus();
    };

    // Listen for audience scroll events
    channel.onmessage = (e) => {
        if (e.data.type === 'slideChanged' && e.data.source === 'audience') {
            currentIndex = e.data.index;
            updatePresenterView();
        }
    };

    initResize();
    initColResize();
    initCarouselResize();

    // Observe panels for fit scaling
    resizeObserver.observe(document.querySelector('#currentSlidePanel .iframe-wrap'));
    resizeObserver.observe(document.querySelector('#nextSlidePanel .iframe-wrap'));
    setTimeout(fitAllIframes, 100);
}

// === CAROUSEL ===
let carouselItemWidth = 106;
let carouselItemHeight = 60;

function buildCarousel() {
    const carousel = document.getElementById('carousel');
    carousel.textContent = '';
    slides.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'carousel-item';
        item.style.width = carouselItemWidth + 'px';
        item.style.height = carouselItemHeight + 'px';
        item.onclick = () => goToSlide(i);

        const iframe = document.createElement('iframe');
        iframe.src = deckBaseUrl;
        iframe.onload = () => {
            scrollIframeToSlide(iframe, i);
            try {
                const iframeDoc = iframe.contentDocument;
                iframeDoc.documentElement.style.overflow = 'hidden';
            } catch(e) {}
        };
        iframe.style.transform = 'scale(' + (carouselItemWidth / 1280) + ')';

        const num = document.createElement('div');
        num.className = 'carousel-num';
        num.textContent = i + 1;

        item.appendChild(iframe);
        item.appendChild(num);
        carousel.appendChild(item);
    });
}

function applyCarouselItemSize() {
    document.querySelectorAll('.carousel-item').forEach(item => {
        item.style.width = carouselItemWidth + 'px';
        item.style.height = carouselItemHeight + 'px';
        const iframe = item.querySelector('iframe');
        if (iframe) iframe.style.transform = 'scale(' + (carouselItemWidth / 1280) + ')';
    });
}

function updateCarouselHighlight() {
    const items = document.querySelectorAll('.carousel-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === currentIndex);
    });
    // Scroll active item into view
    const activeItem = items[currentIndex];
    if (activeItem) {
        activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
}

// === FIT IFRAMES ===
function fitIframe(iframe) {
    const wrap = iframe.parentElement;
    if (!wrap) return;
    const wW = wrap.clientWidth;
    const wH = wrap.clientHeight;
    if (wW === 0 || wH === 0) return;
    const scale = Math.min(wW / 1280, wH / 720);
    iframe.style.transform = `scale(${scale})`;
}

function fitAllIframes() {
    fitIframe(document.getElementById('currentFrame'));
    fitIframe(document.getElementById('nextFrame'));
}

const resizeObserver = new ResizeObserver(() => fitAllIframes());

// === RESIZE HANDLE ===
function initResize() {
    const handle = document.getElementById('resizeHandle');
    const panel = document.querySelector('.notes-panel');
    const nextPanel = document.getElementById('nextSlidePanel');
    let startY = 0;
    let startHeight = 0;

    handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startY = e.clientY;
        startHeight = nextPanel.offsetHeight;
        handle.classList.add('dragging');
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onRelease);
    });

    function onDrag(e) {
        const delta = e.clientY - startY;
        const panelHeight = panel.offsetHeight;
        const effectiveDelta = layoutSwapped ? -delta : delta;
        const newHeight = Math.max(60, Math.min(panelHeight - 80, startHeight + effectiveDelta));
        nextPanel.style.height = newHeight + 'px';
    }

    function onRelease() {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onRelease);
    }
}

function syncAudienceToSlide(index) {
    if (audienceWin && !audienceWin.closed) {
        try {
            const sections = audienceWin.document.querySelectorAll('section');
            if (sections[index]) {
                // Disable snap for instant jump, then re-enable
                audienceWin.document.documentElement.style.scrollBehavior = 'auto';
                audienceWin.document.documentElement.style.scrollSnapType = 'none';
                sections[index].scrollIntoView();
                setTimeout(() => {
                    audienceWin.document.documentElement.style.scrollBehavior = 'smooth';
                    audienceWin.document.documentElement.style.scrollSnapType = 'y mandatory';
                }, 50);
            }
        } catch(e) {}
    }
}

function goToSlide(index) {
    if (index < 0 || index >= slides.length) return;
    currentIndex = index;
    updatePresenterView();
    // Tell audience to scroll
    if (channel) {
        channel.postMessage({ type: 'goToSlide', index: index, source: 'presenter' });
    }
    // Sync audience window
    syncAudienceToSlide(index);
}

function updatePresenterView() {
    const slide = slides[currentIndex];
    const nextSlideData = slides[currentIndex + 1];

    // Counter
    document.getElementById('slideCounter').textContent = `${currentIndex + 1} / ${slides.length}`;

    // Title
    document.getElementById('slideTitle').textContent = slide.title;

    // Notes
    const notesEl = document.getElementById('notesText');
    notesEl.innerText = slide.notes || '(no notes for this slide)';
    notesEl.style.fontSize = notesFontSize + 'px';

    // Current slide iframe - scroll to section
    const currentFrame = document.getElementById('currentFrame');
    if (!currentFrame.src || !currentFrame.src.includes(deckBaseUrl.split('?')[0])) {
        currentFrame.src = deckBaseUrl;
        currentFrame.onload = () => { scrollIframeToSlide(currentFrame, currentIndex); fitIframe(currentFrame); };
    } else {
        scrollIframeToSlide(currentFrame, currentIndex);
    }

    // Next slide iframe
    const nextFrame = document.getElementById('nextFrame');
    if (nextSlideData) {
        if (!nextFrame.src || !nextFrame.src.includes(deckBaseUrl.split('?')[0])) {
            nextFrame.src = deckBaseUrl;
            nextFrame.onload = () => { scrollIframeToSlide(nextFrame, currentIndex + 1); fitIframe(nextFrame); };
        } else {
            scrollIframeToSlide(nextFrame, currentIndex + 1);
        }
    }

    // Re-apply dots hiding if active
    if (dotsHidden) {
        setTimeout(() => reapplyDotsHiding(), 100);
    }

    // Carousel highlight
    updateCarouselHighlight();

    // Reflect this slide's pending agentic-save state on the button
    const saveBtn = document.getElementById('agenticSaveBtn');
    if (saveBtn) saveBtn.disabled = !!(slides[currentIndex] && slides[currentIndex].savePending);
}

function scrollIframeToSlide(iframe, index) {
    try {
        const doc = iframe.contentDocument;
        const sections = doc.querySelectorAll('section');
        if (sections[index]) {
            // Disable smooth scroll for instant jump in preview
            doc.documentElement.style.scrollBehavior = 'auto';
            doc.documentElement.style.scrollSnapType = 'none';
            sections[index].scrollIntoView();
            // Re-enable after a tick
            setTimeout(() => {
                doc.documentElement.style.scrollBehavior = 'smooth';
                doc.documentElement.style.scrollSnapType = 'y mandatory';
            }, 50);
        }
    } catch(e) {}
}

function nextSlide() {
    goToSlide(currentIndex + 1);
}

function prevSlide() {
    goToSlide(currentIndex - 1);
}

function toggleTimer() {
    if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerBtn').classList.remove('active');
    } else {
        timerRunning = true;
        document.getElementById('timerBtn').classList.add('active');
        timerInterval = setInterval(() => {
            timerSeconds++;
            const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
            const s = String(timerSeconds % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
    }
}

// === CAROUSEL RESIZE ===
function initCarouselResize() {
    const handle = document.getElementById('carouselResizeHandle');
    const carousel = document.getElementById('carousel');
    let startY = 0;
    let startHeight = 0;

    handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startY = e.clientY;
        startHeight = carousel.offsetHeight;
        handle.classList.add('dragging');
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onRelease);
    });

    function onDrag(e) {
        const delta = startY - e.clientY; // upward drag grows the carousel
        const minH = 72;
        const maxH = Math.max(minH, window.innerHeight * 0.6);
        const newHeight = Math.max(minH, Math.min(maxH, startHeight + delta));
        carousel.style.height = newHeight + 'px';
        // Item height fills the carousel minus padding (6+6) and scrollbar (~3)
        const itemH = Math.max(40, newHeight - 15);
        const itemW = Math.round(itemH * (1280 / 720));
        carouselItemHeight = itemH;
        carouselItemWidth = itemW;
        applyCarouselItemSize();
        fitAllIframes();
    }

    function onRelease() {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onRelease);
    }
}

// === COLUMN RESIZE ===
function initColResize() {
    const handle = document.getElementById('colResizeHandle');
    const presenter = document.getElementById('presenter');
    let startX = 0;
    let startLeftWidth = 0;

    handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startX = e.clientX;
        startLeftWidth = document.getElementById('currentSlidePanel').offsetWidth;
        handle.classList.add('dragging');
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onRelease);
    });

    function onDrag(e) {
        const delta = e.clientX - startX;
        const totalWidth = presenter.clientWidth - 24 - 8; // padding + handle
        const newLeft = Math.max(200, Math.min(totalWidth - 200, startLeftWidth + delta));
        const leftFr = newLeft / totalWidth;
        const rightFr = 1 - leftFr;
        presenter.style.gridTemplateColumns = `${leftFr}fr 8px ${rightFr}fr`;
        fitAllIframes();
    }

    function onRelease() {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onRelease);
    }
}

// === TOGGLE OPTIONS ===
let dotsHidden = true;
let carouselHidden = false;
let notesLight = false;
let notesFontSize = 20;
let layoutSwapped = true;

function toggleDots() {
    dotsHidden = !dotsHidden;
    document.getElementById('toggleDotsBtn').classList.toggle('active', !dotsHidden);
    const hideCSS = `
        .slide-dots, .nav-dots, .dot-nav, .progress-dots,
        [class*="dot-indicator"], [class*="slide-nav"] .dot,
        nav[class*="dot"], .dots, .slide-indicators,
        [class*="pagination-dot"], .nav-bullets,
        [style*="position: fixed"][style*="right"] { display: none !important; visibility: hidden !important; }
    `;
    applyToAllIframes((doc) => {
        let style = doc.getElementById('presenter-hide-dots');
        if (dotsHidden) {
            if (!style) {
                style = doc.createElement('style');
                style.id = 'presenter-hide-dots';
                style.textContent = hideCSS;
                doc.head.appendChild(style);
            }
        } else {
            if (style) style.remove();
        }
    });
}

function reapplyDotsHiding() {
    const hideCSS = `
        .slide-dots, .nav-dots, .dot-nav, .progress-dots,
        [class*="dot-indicator"], [class*="slide-nav"] .dot,
        nav[class*="dot"], .dots, .slide-indicators,
        [class*="pagination-dot"], .nav-bullets,
        [style*="position: fixed"][style*="right"] { display: none !important; visibility: hidden !important; }
    `;
    applyToAllIframes((doc) => {
        if (!doc.getElementById('presenter-hide-dots')) {
            const style = doc.createElement('style');
            style.id = 'presenter-hide-dots';
            style.textContent = hideCSS;
            doc.head.appendChild(style);
        }
    });
}

function toggleCarousel() {
    carouselHidden = !carouselHidden;
    document.getElementById('toggleCarouselBtn').classList.toggle('active', !carouselHidden);
    document.getElementById('carousel').classList.toggle('hidden', carouselHidden);
    document.getElementById('carouselResizeHandle').classList.toggle('hidden', carouselHidden);
    fitAllIframes();
}

function toggleNotesTheme() {
    notesLight = !notesLight;
    document.getElementById('toggleNotesThemeBtn').classList.toggle('active', notesLight);
    document.querySelector('.notes-content').classList.toggle('light', notesLight);
}

function toggleSwapLayout() {
    layoutSwapped = !layoutSwapped;
    document.getElementById('toggleSwapBtn').classList.toggle('active', layoutSwapped);
    const panel = document.querySelector('.notes-panel');
    const notes = document.querySelector('.notes-content');
    const next = document.getElementById('nextSlidePanel');
    const handle = document.getElementById('resizeHandle');
    if (layoutSwapped) {
        panel.insertBefore(notes, panel.firstChild);
        panel.insertBefore(handle, next);
    } else {
        panel.insertBefore(next, panel.firstChild);
        panel.insertBefore(handle, notes);
    }
    fitAllIframes();
}

function applyDefaultToggles() {
    // Dots hidden by default: button inactive (no 'active' class) but hide CSS gets reapplied on iframe load
    document.getElementById('toggleDotsBtn').classList.toggle('active', !dotsHidden);
    // Carousel visible by default: button active
    document.getElementById('toggleCarouselBtn').classList.toggle('active', !carouselHidden);
    // Layout swapped by default: reorder notes/next, mark button active
    if (layoutSwapped) {
        const panel = document.querySelector('.notes-panel');
        const notes = document.querySelector('.notes-content');
        const next = document.getElementById('nextSlidePanel');
        const handle = document.getElementById('resizeHandle');
        panel.insertBefore(notes, panel.firstChild);
        panel.insertBefore(handle, next);
        document.getElementById('toggleSwapBtn').classList.add('active');
    }
}

function changeNotesFontSize(delta) {
    notesFontSize = Math.max(12, Math.min(40, notesFontSize + delta));
    document.getElementById('notesText').style.fontSize = notesFontSize + 'px';
}

function applyToAllIframes(fn) {
    const iframes = document.querySelectorAll('#currentFrame, #nextFrame');
    iframes.forEach(iframe => {
        try { fn(iframe.contentDocument); } catch(e) {}
    });
    // Also audience window
    if (audienceWin && !audienceWin.closed) {
        try { fn(audienceWin.document); } catch(e) {}
    }
}

// === AGENTIC SAVE NOTES ===
function httpUrlToWorkspaceRel(url) {
    try {
        const u = new URL(url);
        const isLocal = (u.hostname === '127.0.0.1' || u.hostname === 'localhost')
                     && u.port === window.location.port;
        if (!isLocal) return null;
        return decodeURIComponent(u.pathname.replace(/^\//, ''));
    } catch { return null; }
}

function splitSectionsRaw(raw) {
    const re = /<section\b[^>]*>[\s\S]*?<\/section>/gi;
    return raw.match(re) || [];
}

function escapeHtmlText(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function countOccurrences(haystack, needle) {
    if (!needle) return 0;
    return haystack.split(needle).length - 1;
}

function buildSurgicalPrompt(relPath, oldBlock, newBlock) {
    return [
        'You will perform exactly ONE Edit on exactly ONE file. No exploration.',
        '',
        `File (workspace-relative): ${relPath}`,
        '',
        'old_string (verbatim, do not modify whitespace):',
        '<<<OLD>>>',
        oldBlock,
        '<<<END>>>',
        '',
        'new_string (verbatim):',
        '<<<NEW>>>',
        newBlock,
        '<<<END>>>',
        '',
        'Rules:',
        '- Use ONLY the Edit tool. Do NOT use Read, Grep, Glob, Bash, or Write.',
        '- Do not search for context; the strings above are exact.',
        '- Do not modify any other file. No tests, no commits, no git.',
        '- If old_string is not found verbatim, reply "NOT_FOUND" and stop.',
        '- If old_string appears more than once, reply "AMBIGUOUS" and stop.',
        '- On success, reply with the single token "OK".'
    ].join('\n');
}

function showBanner(state, slideIdx, slideTitle, msg) {
    const container = document.getElementById('agenticBanners');
    const el = document.createElement('div');
    el.className = 'agentic-banner ' + state;
    el.dataset.slide = slideIdx;
    el.innerHTML = `
        <div class="ab-head">
            <div class="ab-title">Slide ${slideIdx + 1} — ${escapeHtmlText(slideTitle).slice(0, 60)}</div>
            <button class="ab-close" title="Dismiss" aria-label="Dismiss">&times;</button>
        </div>
        <div class="ab-msg"></div>
        <div class="ab-actions" style="display:none;"></div>
    `;
    el.querySelector('.ab-close').addEventListener('click', () => el.remove());
    updateBanner(el, state, msg);
    container.appendChild(el);
    return el;
}

function updateBanner(el, state, msg, withReload) {
    if (!el || !el.isConnected) return;
    el.classList.remove('success', 'error');
    if (state === 'success') el.classList.add('success');
    else if (state === 'error') el.classList.add('error');

    const msgEl = el.querySelector('.ab-msg');
    const spinnerHtml = state === 'pending' ? '<span class="ab-spinner"></span>' : '';
    msgEl.innerHTML = spinnerHtml + escapeHtmlText(msg);

    const actions = el.querySelector('.ab-actions');
    actions.innerHTML = '';
    if (withReload) {
        const btn = document.createElement('button');
        btn.textContent = 'Reload presenter';
        btn.title = 'Reload to see the saved note (unsaved edits on other slides will be lost)';
        btn.addEventListener('click', () => window.location.reload());
        actions.appendChild(btn);
        actions.style.display = 'flex';
    } else {
        actions.style.display = 'none';
    }

    if (state === 'success') {
        setTimeout(() => { if (el.isConnected) el.remove(); }, 12000);
    }
}

async function agenticSaveNotes() {
    const idx = currentIndex;
    const title = (slides[idx] && slides[idx].title) || `Slide ${idx + 1}`;
    if (slides[idx] && slides[idx].savePending) return;

    const relPath = httpUrlToWorkspaceRel(deckBaseUrl);
    if (!relPath) {
        showBanner('error', idx, title, 'Deck not served from this workspace.');
        return;
    }

    const newText = document.getElementById('notesText').innerText;
    const banner = showBanner('pending', idx, title, 'Reading source…');

    let raw;
    try {
        raw = await fetch(deckBaseUrl, { cache: 'no-store' }).then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        });
    } catch (e) {
        updateBanner(banner, 'error', `Could not refetch deck: ${e.message}`);
        return;
    }

    const sections = splitSectionsRaw(raw);
    if (idx >= sections.length) {
        updateBanner(banner, 'error', `Source has only ${sections.length} sections.`);
        return;
    }

    const noteRe = /(<div\b[^>]*\bclass="[^"]*\bspeaker-notes\b[^"]*"[^>]*>)([\s\S]*?)(<\/div>)/i;
    const match = sections[idx].match(noteRe);
    if (!match) {
        updateBanner(banner, 'error', 'No <div class="speaker-notes"> in this section. Add one to the source first.');
        return;
    }

    const oldBlock = match[0];
    const newInner = escapeHtmlText(newText);
    const newBlock = match[1] + newInner + match[3];

    if (oldBlock === newBlock) {
        updateBanner(banner, 'success', 'No changes to save.');
        return;
    }

    const occurrences = countOccurrences(raw, oldBlock);
    if (occurrences !== 1) {
        updateBanner(banner, 'error',
            occurrences === 0 ? 'Could not locate the original notes block in source.'
                              : 'Notes content matches multiple slides — edit slightly to disambiguate.');
        return;
    }

    if (slides[idx]) slides[idx].savePending = true;
    if (idx === currentIndex) document.getElementById('agenticSaveBtn').disabled = true;
    updateBanner(banner, 'pending', 'Saving via Claude (up to 5 min)…');

    const prompt = buildSurgicalPrompt(relPath, oldBlock, newBlock);

    try {
        const res = await fetch('/__claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, mode: 'print', allowEdits: true })
        });
        const data = await res.json().catch(() => ({}));
        const responseTxt = (data.response || '').trim();
        const ok = res.ok && data.ok && /^OK\b/.test(responseTxt);
        if (ok) {
            updateBanner(banner, 'success',
                'Saved to source. Reload presenter to see the updated note (unsaved edits on other slides will be lost).',
                true);
        } else {
            let reason;
            if (/NOT_FOUND/.test(responseTxt)) reason = 'Source changed in flight (NOT_FOUND).';
            else if (/AMBIGUOUS/.test(responseTxt)) reason = 'Multiple matches detected by Claude (AMBIGUOUS).';
            else reason = (data.error || responseTxt || `HTTP ${res.status}`).slice(0, 200);
            updateBanner(banner, 'error', `Save failed: ${reason}`);
        }
    } catch (e) {
        updateBanner(banner, 'error', `Network error: ${e.message}`);
    } finally {
        if (slides[idx]) slides[idx].savePending = false;
        if (idx === currentIndex) document.getElementById('agenticSaveBtn').disabled = false;
    }
}

// === TIMER RESET ===
function resetTimer() {
    timerSeconds = 0;
    document.getElementById('timer').textContent = '00:00';
    if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerBtn').classList.remove('active');
    }
}

// === CLOCK ===
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Save notes edits in real-time
document.getElementById('notesText').addEventListener('input', () => {
    if (slides[currentIndex]) {
        slides[currentIndex].notes = document.getElementById('notesText').innerText;
    }
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    // Skip navigation shortcuts when editing notes
    const editingNotes = document.activeElement === document.getElementById('notesText');
    if (document.getElementById('startup').classList.contains('hidden')) {
        if (editingNotes) {
            if (e.key === 'Escape') {
                document.getElementById('notesText').blur();
            }
            return; // Let normal typing work
        }
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
            e.preventDefault();
            nextSlide();
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
            e.preventDefault();
            prevSlide();
        } else if (e.key === 'f' || e.key === 'F') {
            // Fullscreen audience window
            if (audienceWin && !audienceWin.closed) {
                try {
                    audienceWin.document.documentElement.requestFullscreen();
                } catch(e) {}
            }
        } else if (e.key === 't' || e.key === 'T') {
            toggleTimer();
        } else if (e.key === 'Home') {
            goToSlide(0);
        } else if (e.key === 'End') {
            goToSlide(slides.length - 1);
        } else if (e.key === '+' || e.key === '=') {
            changeNotesFontSize(2);
        } else if (e.key === '-') {
            changeNotesFontSize(-2);
        }
    } else {
        if (e.key === 'Enter') {
            startPresenter();
        }
    }
});

// Check hash for deck URL (hash not sent to server, avoids 404)
// Usage: slide-presenter.html#http://127.0.0.1:3134/path/to/deck.html
const hashDeck = window.location.hash.slice(1);
if (hashDeck) {
    document.getElementById('deckUrl').value = decodeURIComponent(hashDeck);
    startPresenter();
}
</script>
